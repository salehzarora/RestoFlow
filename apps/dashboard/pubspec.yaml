name: restoflow_dashboard
description: RestoFlow dashboard app - owner/manager dashboard target. RF-104 adds the visible demo report-cards UI (in-memory, no backend).
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: '>=2.5.0 <3.0.0'
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_design_system:
    path: ../../packages/design_system
  restoflow_money:
    path: ../../packages/money
  # RF-108 Stage 4: the auth gate (demo-mode fallback / role-based entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
  # RF-151: real owner login/sign-up + restaurant onboarding. `core` provides the
  # Result type held by the auth flow; `data_remote` provides the anon-key RPC
  # transport (create_organization / get_my_context); `supabase` provides GoTrue
  # sign-in/up on the SAME anon-key client (DECISION D-011 — no service-role key).
  # All three are already in the workspace dependency graph (declared directly so
  # the app imports them cleanly); no new external package is introduced.
  restoflow_core:
    path: ../../packages/core
  restoflow_data_remote:
    path: ../../packages/data_remote
  supabase: '>=2.0.0 <3.0.0'
  # RF-151 review fix: SHA-256 for a DETERMINISTIC (non-random) onboarding
  # idempotency key + fallback slug, so retries replay instead of duplicating.
  # Already in the workspace dependency graph (transitive); declared directly.
  crypto: '>=3.0.0 <4.0.0'
  # RF-152: the OFFICIAL Supabase/Flutter session-persistence mechanism (survives
  # browser refresh / app restart; anon key only, no service-role — DECISION D-011).
  # shared_preferences persists the NON-SECRET selected-membership id (never a token).
  supabase_flutter: '>=2.0.0 <3.0.0'
  shared_preferences: '>=2.0.0 <3.0.0'
  # RF-111: the owner menu management surface (demo-backed; no real backend yet).
  restoflow_feature_menu:
    path: ../../packages/feature_menu
  # RF-113: the owner Settings / Users / Devices admin surfaces (demo-backed).
  restoflow_feature_admin:
    path: ../../packages/feature_admin
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font so Icon(Icons.*) renders glyphs, not tofu.
  uses-material-design: true
