name: restoflow_kds
description: RestoFlow kds app - Kitchen Display System (KDS) app target. RF-063 wires the provider-backed polling-first sync_pull data path with a local fixture fallback.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # Persists the NON-SECRET selected UI language per device/browser (sprint).
  shared_preferences: '>=2.0.0 <3.0.0'
  restoflow_feature_kitchen:
    path: ../../packages/feature_kitchen
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_domain:
    path: ../../packages/domain
  restoflow_sync:
    path: ../../packages/sync
  restoflow_design_system:
    path: ../../packages/design_system
  # RF-115: the ESC/POS adapter + the LOCAL print-bridge client (loopback HTTP,
  # honest outcomes) that turns a prepared kitchen ticket into a real/sink print.
  restoflow_printing:
    path: ../../packages/printing
  # ANDROID-004: the shared native (Wi-Fi RAW/TCP + Bluetooth Classic SPP) ESC/POS
  # printing layer reused with the POS (config models, web-safe BT connector,
  # device-local config providers, testers, transport resolver, settings UI). The
  # KDS prints MONEY-FREE kitchen tickets over the selected local transport.
  restoflow_native_printing:
    path: ../../packages/native_printing
  # PRINT-BLUETOOTH-RECOVERY-001: Bluetooth Classic (SPP) printing runs over the
  # in-house `restoflow.native_printing/bluetooth` MethodChannel implemented by
  # this app's MainActivity (the broken `print_bluetooth_thermal` plugin was
  # removed). permission_handler: the Android 12+ runtime BLUETOOTH_CONNECT
  # request, referenced transitively via restoflow_native_printing.
  permission_handler: ^11.3.1
  # RF-108 Stage 4: the auth gate (demo-mode fallback / role-based entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
  # RF-136: the shared public-schema RPC transport (SyncRpcTransport) + SyncSession
  # + SyncPullApi the real KDS coordinator uses to poll public.sync_pull (RF-064).
  restoflow_data_remote:
    path: ../../packages/data_remote
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font so Icon(Icons.*) renders glyphs, not tofu.
  uses-material-design: true
