name: restoflow_kds
description: RestoFlow kds app - Kitchen Display System (KDS) app target. RF-063 wires the provider-backed polling-first sync_pull data path with a local fixture fallback.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: '>=2.5.0 <3.0.0'
  restoflow_feature_kitchen:
    path: ../../packages/feature_kitchen
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_domain:
    path: ../../packages/domain
  restoflow_sync:
    path: ../../packages/sync
  restoflow_design_system:
    path: ../../packages/design_system
  # RF-108 Stage 4: the auth gate (demo-mode fallback / role-based entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
  # RF-136: the shared public-schema RPC transport (SyncRpcTransport) + SyncSession
  # + SyncPullApi the real KDS coordinator uses to poll public.sync_pull (RF-064).
  restoflow_data_remote:
    path: ../../packages/data_remote
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font so Icon(Icons.*) renders glyphs, not tofu.
  uses-material-design: true
