name: restoflow_admin
description: RestoFlow admin app - platform-admin app target (isolated, audited path). RF-108 Stage 4 wires the auth gate (platform-admin-only entry); no platform-admin features/data yet.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_design_system:
    path: ../../packages/design_system
  # RF-108 Stage 4: the auth gate (demo-mode fallback / platform-admin entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font so the auth gate's Icon(Icons.*) render.
  uses-material-design: true
