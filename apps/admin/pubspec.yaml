name: restoflow_admin
description: RestoFlow admin app - platform-admin app target (isolated, audited path). RF-108 Stage 4 wires the auth gate (platform-admin-only entry); RF-120 adds the demo-backed platform overview (KPIs, organizations, branch health, recent activity) behind a repository seam.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  # RF-120: the platform-admin overview is built on Riverpod (repository seam +
  # FutureProvider), mirroring the RF-104/RF-119 owner dashboard pattern.
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # Persists the NON-SECRET selected UI language per device/browser (sprint).
  shared_preferences: '>=2.0.0 <3.0.0'
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_design_system:
    path: ../../packages/design_system
  # RF-108 Stage 4: the auth gate (demo-mode fallback / platform-admin entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
  # RF-128: the shared public-schema RPC transport (SyncRpcTransport) the real
  # platform-admin repo calls the RF-125 public.platform_admin_* wrappers through.
  restoflow_data_remote:
    path: ../../packages/data_remote
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font so the auth gate's Icon(Icons.*) render.
  uses-material-design: true
