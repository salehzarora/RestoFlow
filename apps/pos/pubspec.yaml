name: restoflow_pos
description: RestoFlow pos app - POS cashier app target. RF-100 adds the visible demo menu + cart UI (in-memory, no backend).
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # Persists the NON-SECRET selected UI language per device/browser (sprint).
  shared_preferences: '>=2.0.0 <3.0.0'
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_domain:
    path: ../../packages/domain
  restoflow_money:
    path: ../../packages/money
  restoflow_design_system:
    path: ../../packages/design_system
  # RF-115: the ESC/POS adapter + the LOCAL print-bridge client (loopback HTTP,
  # honest outcomes) that turns a prepared receipt into a real/sink print.
  restoflow_printing:
    path: ../../packages/printing
  # ANDROID-004: the shared native (Wi-Fi RAW/TCP + Bluetooth Classic SPP) ESC/POS
  # printing layer reused by POS + KDS (config models, web-safe BT connector,
  # device-local config providers, testers, transport resolver, settings UI).
  restoflow_native_printing:
    path: ../../packages/native_printing
  # RF-108 Stage 4: the auth gate (demo-mode fallback / role-based entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
  # RF-129: the shared public-schema RPC transport (SyncRpcTransport) + SyncSession
  # the real outbox uses to POST order.submit ops to public.sync_push (RF-126).
  restoflow_data_remote:
    path: ../../packages/data_remote
  # PRINT-BLUETOOTH-RECOVERY-001: Bluetooth Classic (SPP) printing runs over the
  # in-house `restoflow.native_printing/bluetooth` MethodChannel implemented by
  # this app's MainActivity (the broken `print_bluetooth_thermal` plugin was
  # removed). permission_handler: the Android 12+ runtime BLUETOOTH_CONNECT
  # request (connect only — the app never scans; bonded devices only).
  permission_handler: ^11.3.1
  # KITCHEN-MODE-001C2A: the generic SecureKeyStore contract + SecretValue +
  # fail-closed exception types the kitchen-spool key adapter implements.
  restoflow_core:
    path: ../../packages/core
  # KITCHEN-MODE-001C2A: Android Keystore-backed storage for the kitchen-spool
  # AES key (same plugin/default options family as the device-session store in
  # feature_auth). DORMANT: nothing in production startup instantiates the
  # adapter yet; web fails closed (no localStorage fallback).
  flutter_secure_storage: '>=9.0.0 <10.0.0'
dev_dependencies:
  flutter_test:
    sdk: flutter
  # KITCHEN-MODE-001C2A CLEANUP 1: TEST-ONLY dependency so the Android
  # backup-contract guard test can import the pinned kitchen-spool path
  # constants (the single source of truth) and bind them to the backup XML
  # resources. NOT a runtime dependency — the dormancy test proves no
  # production source imports restoflow_data_local.
  restoflow_data_local:
    path: ../../packages/data_local

flutter:
  # Bundles the Material Icons font so `Icon(Icons.*)` renders glyphs (not the
  # missing-glyph "tofu" boxes). Required for any app that uses Material icons.
  uses-material-design: true
