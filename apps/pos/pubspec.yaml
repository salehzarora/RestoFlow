name: restoflow_pos
description: RestoFlow pos app - POS cashier app target. RF-100 adds the visible demo menu + cart UI (in-memory, no backend).
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # Persists the NON-SECRET selected UI language per device/browser (sprint).
  shared_preferences: '>=2.0.0 <3.0.0'
  restoflow_l10n:
    path: ../../packages/l10n
  restoflow_domain:
    path: ../../packages/domain
  restoflow_money:
    path: ../../packages/money
  restoflow_design_system:
    path: ../../packages/design_system
  # RF-115: the ESC/POS adapter + the LOCAL print-bridge client (loopback HTTP,
  # honest outcomes) that turns a prepared receipt into a real/sink print.
  restoflow_printing:
    path: ../../packages/printing
  # RF-108 Stage 4: the auth gate (demo-mode fallback / role-based entry).
  restoflow_auth_identity:
    path: ../../packages/auth_identity
  restoflow_feature_auth:
    path: ../../packages/feature_auth
  # RF-129: the shared public-schema RPC transport (SyncRpcTransport) + SyncSession
  # the real outbox uses to POST order.submit ops to public.sync_push (RF-126).
  restoflow_data_remote:
    path: ../../packages/data_remote
  # ANDROID-003: Bluetooth Classic (SPP) thermal printing on the native Android
  # POS app. Both are Android/iOS plugins — the web build skips them (no web
  # platform impl) and the POS references them ONLY behind a conditional import
  # (bluetooth_connector_native.dart), so web never links native Bluetooth code.
  # print_bluetooth_thermal: bonded-device listing + connect + writeBytes (SPP,
  # NOT BLE-only). permission_handler: the Android 12+ runtime BLUETOOTH_CONNECT/
  # BLUETOOTH_SCAN requests.
  print_bluetooth_thermal: ^1.1.1
  permission_handler: ^11.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  # Bundles the Material Icons font so `Icon(Icons.*)` renders glyphs (not the
  # missing-glyph "tofu" boxes). Required for any app that uses Material icons.
  uses-material-design: true
