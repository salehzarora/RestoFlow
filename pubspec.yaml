name: restoflow
description: RestoFlow multi-tenant Restaurant OS - Dart pub workspace root for the Melos monorepo (RF-010 skeleton; no business logic). See docs/ARCHITECTURE.md section 3.
publish_to: none
environment:
  sdk: ^3.12.0
workspace:
  - apps/pos
  - apps/kds
  - apps/dashboard
  - apps/admin
  - packages/core
  - packages/domain
  - packages/data_local
  - packages/data_remote
  - packages/sync
  - packages/auth_identity
  - packages/money
  - packages/printing
  - packages/design_system
  - packages/l10n
  - packages/feature_auth
  - packages/feature_orders
  - packages/feature_kitchen
  - packages/feature_payments
  - packages/feature_shifts
  - packages/feature_menu
  - packages/feature_reporting
dev_dependencies:
  melos: ^7.0.0

# Melos 7 reads its configuration from this `melos:` key when the root pubspec
# defines a Dart pub `workspace:` (a standalone melos.yaml is not used in that
# mode). Packages are derived from the workspace list above.
melos:
  scripts:
    analyze:
      description: Static-analyze every workspace package.
      # Root-level `dart analyze .` (NOT a Melos `exec:` script). With Dart pub
      # workspaces this analyzes EVERY member package in a single pass. Crucially
      # it needs NO global `melos` on PATH: Melos runs an `exec:` script by
      # invoking the `melos` binary, which is absent in CI (only `dart run melos`
      # exists there) — that caused "eval: melos: not found" (RF-012 CI fix). A
      # plain `run:` command invokes no nested melos, so it works everywhere.
      run: dart analyze .
