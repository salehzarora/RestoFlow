name: restoflow_native_printing
description: RestoFlow native on-device printing - the shared native (Wi-Fi RAW/TCP + Bluetooth Classic SPP) ESC/POS printing layer reused by the POS and KDS Android apps (ANDROID-004). Config models, a web-safe Bluetooth connector behind a conditional import, device-local config providers, test-print seams, a transport resolver, and a label-injected settings UI. Money-free by construction - it only carries already-built PrintDocuments to a transport.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # Persists the NON-SECRET device-local printer config (per device id + app
  # namespace), exactly like the POS did in ANDROID-002/003.
  shared_preferences: '>=2.0.0 <3.0.0'
  # The render-neutral PrintDocument, ESC/POS adapter, profiles, transports
  # (NetworkTcpPrintTransport), test document, and honest bridge result types.
  restoflow_printing:
    path: ../printing
  # The shared design tokens/components used by the settings UI (spacing, tones,
  # notice banner, inline spinner, icon sizes).
  restoflow_design_system:
    path: ../design_system
  # PRINT-BLUETOOTH-RECOVERY-001: Bluetooth Classic (SPP) printing is served by
  # the HOST APP's in-house `restoflow.native_printing/bluetooth` MethodChannel
  # (POS/KDS MainActivity) — the broken `print_bluetooth_thermal` plugin was
  # removed. permission_handler stays for the Android 12+ runtime
  # BLUETOOTH_CONNECT request, referenced ONLY behind the conditional import
  # (bluetooth_connector_native.dart), so web never links native Bluetooth code.
  permission_handler: ^11.3.1
dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
