name: restoflow_feature_kitchen
description: RestoFlow feature_kitchen package - the kitchen capability (composes domain + data + UI). RF-063 adds the KDS client data path - view models, a money-free sync_pull row mapper, a repository, and Riverpod providers.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  # RF-063: Riverpod state management (DECISION D-009 / ARCHITECTURE §4).
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # RF-058: the realtime invalidation-source type for the optional KDS bridge.
  restoflow_data_remote:
    path: ../data_remote
  restoflow_domain:
    path: ../domain
  # RF-072: render-neutral PrintDocument + durable PrintSpool/PrintJob for
  # kitchen-ticket printing (RF-070/RF-071). Consumed, never modified.
  restoflow_printing:
    path: ../printing
  restoflow_sync:
    path: ../sync
dev_dependencies:
  flutter_test:
    sdk: flutter
