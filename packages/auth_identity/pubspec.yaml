name: restoflow_auth_identity
description: RestoFlow auth_identity package - RF-108 typed models + services for real auth and role-based entry (public.get_my_context / public.start_pin_session). The six identity concepts and the six membership role keys; no UI/app integration in this stage.
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
resolution: workspace

# RF-108 is pure Dart (models + services + bootstrap + unit tests; no Flutter/UI).
# It consumes the abstract RPC seam (SyncRpcTransport) from data_remote and the
# Result type from core. RF-108 Stage 2 adds a Supabase bootstrap factory that
# constructs the anon-key SupabaseClient from --dart-define config, so this
# package now depends on the pure-Dart `supabase` SDK (NOT supabase_flutter).
# The client carries ONLY the PUBLIC anon key + URL; this package holds NO
# secret and never uses a service-role key (DECISION D-011).
dependencies:
  restoflow_core:
    path: ../core
  restoflow_data_remote:
    path: ../data_remote
  supabase: '>=2.0.0 <3.0.0'

dev_dependencies:
  test: ^1.25.0
