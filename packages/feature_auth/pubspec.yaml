name: restoflow_feature_auth
description: RestoFlow feature_auth package - the shared auth-gate UI (RF-108). Renders the pure-Dart AuthGateState (from auth_identity) into localized loading / sign-in / denied / no-access / wrong-role / deferred states + a membership picker. No app wiring and no Supabase session lifecycle here (that is the app layer / a later stage).
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  # The pure-Dart auth gate state machine + models (RF-108 Stage 1/3).
  restoflow_auth_identity:
    path: ../auth_identity
  # Shared theme + tokens (no service-specific widgets live there).
  restoflow_design_system:
    path: ../design_system
  # The single localization owner (ar/he/en + RTL/LTR delegates).
  restoflow_l10n:
    path: ../l10n
dev_dependencies:
  flutter_test:
    sdk: flutter
