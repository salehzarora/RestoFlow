name: restoflow_feature_auth
description: RestoFlow feature_auth package - the shared auth-gate UI (RF-108). Renders the pure-Dart AuthGateState (from auth_identity) into localized loading / sign-in / denied / no-access / wrong-role / deferred states + a membership picker. No app wiring and no Supabase session lifecycle here (that is the app layer / a later stage).
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
  flutter: ">=3.0.0"
resolution: workspace
dependencies:
  flutter:
    sdk: flutter
  # M7: the single demo/real composition point (runtimeConfigProvider).
  flutter_riverpod: '>=2.5.0 <3.0.0'
  # The pure-Dart auth gate state machine + models (RF-108 Stage 1/3).
  restoflow_auth_identity:
    path: ../auth_identity
  # Result/Failure types (RF-108 Stage 4 host + fail-closed env fetcher).
  restoflow_core:
    path: ../core
  # Shared theme + tokens (no service-specific widgets live there).
  restoflow_design_system:
    path: ../design_system
  # The single localization owner (ar/he/en + RTL/LTR delegates).
  restoflow_l10n:
    path: ../l10n
  # RF-161: OS-backed secure storage for the raw device-session token (never prefs).
  flutter_secure_storage: '>=9.0.0 <10.0.0'
  # RF-161: the neutral RPC transport seam (SyncRpcTransport) for the real pairing repo.
  restoflow_data_remote:
    path: ../data_remote
dev_dependencies:
  flutter_test:
    sdk: flutter
