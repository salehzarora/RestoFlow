name: restoflow_printing
description: RestoFlow printing package - the replaceable printing adapter (RF-070). Pure-Dart, hardware-free - render-neutral PrintDocument, ESC/POS byte adapter, profiles, in-memory transport. No spool/templates/real transport (later tickets).
publish_to: none
version: 0.0.1
environment:
  sdk: ^3.12.0
resolution: workspace

# RF-070: pure Dart, no Flutter/dart:ui, no hardware, no money math. Uses only
# the Dart SDK (dart:typed_data). No production dependencies.
dev_dependencies:
  test: ^1.25.0
