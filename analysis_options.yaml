# RestoFlow workspace analyzer configuration (RF-010 skeleton).
# Stricter lint rules / lint packages are introduced in later tickets (RF-011+).
analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.config.dart"
    # RF-020: committed Flutter gen-l10n output (not named *.g.dart). Narrowly
    # excluded so generated localizations are not linted; it is still resolvable
    # by importers and exercised by `flutter test packages/l10n`.
    - "packages/l10n/lib/src/generated/**"
