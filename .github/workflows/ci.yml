name: CI

# RestoFlow CI — two jobs, both run on every pull request + pushes to `main`,
# and both SECRET-FREE (no repository secrets, no Supabase service-role key, no
# remote/linked Supabase):
#
#   * validate  (RF-012) — Dart workspace gates: format, melos bootstrap, static
#     analysis, core/domain tests, and the no-floating-point-money + secret-leak
#     guardrails. Runs NO Docker, NO `supabase`, NO `db reset`, NO migrations.
#   * db-tests  (RF-019) — the reusable tenant-isolation pgTAP harness plus the
#     per-table RLS suites, run against a DOCKER-LOCAL, EPHEMERAL Supabase stack
#     (`supabase start` + `supabase db reset` + `supabase test db`). Local-only
#     and secret-free: no `supabase login`, no access token, no service-role key,
#     no `${{ secrets.* }}`, never a remote/linked project
#     (DECISION D-009 / D-011 / D-016; RISK R-003).
#
# App build gates are intentionally deferred until the apps gain platform targets
# (see RF-012 notes / ~M1).

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: a read-only token. This pipeline needs no write scope and no
# secrets. If a future job ever needs one, reference it by NAME only
# (e.g. ${{ secrets.SOME_NAME }}) — never inline a credential value here.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: format · bootstrap · analyze · test · guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter (bundles Dart)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Tool versions
        run: |
          flutter --version
          dart --version

      # Resolve the whole pub workspace (incl. the local `melos` dev-dependency
      # and the Flutter-SDK members) so `dart run melos ...` works on a fresh
      # runner without a global Melos install.
      - name: Resolve workspace
        run: flutter pub get

      - name: Bootstrap workspace (melos)
        run: dart run melos bootstrap

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      # RF-018 (RF018-B1): CI does NOT run build_runner. Drift codegen proved
      # unreliable in the review/CI environment (repeated clean-checkout timeouts
      # across default, --force-jit, and pinned-2.4.x command variants), so the
      # SINGLE production Drift output — packages/data_local/lib/src/
      # local_database.g.dart — is committed (a narrow .gitignore exception keeps
      # only that one file tracked) and regenerated locally by developers via
      # `dart run build_runner build` (build_runner/drift_dev remain dev deps).
      # This step only fails fast if the committed generated part is missing; it
      # generates nothing. It runs before analysis so `dart analyze .` can resolve
      # the @DriftDatabase part file.
      - name: Verify committed Drift generated code
        run: test -f packages/data_local/lib/src/local_database.g.dart

      - name: Static analysis
        run: dart run melos run analyze

      - name: Tests — core
        run: dart test packages/core

      - name: Tests — domain
        run: dart test packages/domain

      - name: Tests — data_local (RF-018)
        run: dart test packages/data_local

      - name: Guardrail — no floating-point money (DECISION D-007)
        run: bash tools/check_no_float_money.sh

      - name: Guardrail — secret-leak scan (DECISION D-011)
        run: bash tools/check_secrets.sh

  # RF-019 — reusable tenant-isolation harness + the RLS pgTAP suites, run against
  # a Docker-local, EPHEMERAL Supabase DB. Separate from `validate` so the fast
  # Dart gates aren't blocked by Docker, and so this job's distinct properties
  # (Docker-using, but still secret-free / local-only) are explicit. A red result
  # means a cross-tenant read/write succeeded, or a tenant-scoped table shipped
  # without RLS — RISK R-003 (CRITICAL).
  db-tests:
    name: supabase pgTAP (tenant-isolation harness + RLS suites)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.107.0

      # Docker-local stack only (GitHub runners ship Docker). DB-only: exclude every
      # non-db service (valid CLI 2.107.0 names) so only Postgres starts — `db reset`
      # + `test db` need nothing else. `--ignore-health-check` is REQUIRED with this
      # exclusion: `supabase start`'s readiness probe targets the API/PostgREST
      # endpoint (kong/rest), which we exclude, so without the flag start would abort
      # before migrations run. NO login, NO access token, NO remote/linked project.
      - name: Start Supabase local stack (DB-only)
        run: supabase start -x analytics,edge-runtime,functions,imgproxy,inbucket,kong,meta,realtime,rest,storage,studio,vector --ignore-health-check

      - name: Apply migrations to the ephemeral local DB
        run: supabase db reset

      - name: Run pgTAP suites (incl. the RF-019 tenant-isolation harness)
        run: supabase test db
